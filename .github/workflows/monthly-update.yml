name: Monthly Bibliography Update

on:
  schedule:
    - cron: '0 8 1 * *'  # 1st of month 8am UTC = 4am ET
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests rich aiohttp httpx

      - name: Run monthly update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        run: |
          mkdir -p logs
          python update_monthly.py 2>&1 | tee logs/monthly_ci.log

      - name: Commit and push
        run: |
          git config user.name "Marc Woernle"
          git config user.email "marcwho13@gmail.com"
          git add data/ output/ docs/
          git diff --staged --quiet || git commit -m "monthly update (automated)"
          git push

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Monthly update failed ($(date +%Y-%m-%d))" \
            --body "The automated monthly update failed. Check the [workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) for details." \
            --label "alert"
