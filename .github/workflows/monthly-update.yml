name: Monthly Bibliography Update

on:
  schedule:
    - cron: '0 8 1 * *'  # 1st of month, 8am UTC = 4am ET
  workflow_dispatch:
    inputs:
      save_candidates:
        description: 'Harvest + dedup + filter only, upload candidates as artifact (skip classification). Use this to feed the Batch API for large backlogs.'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache DBLP dump
        uses: actions/cache@v4
        with:
          path: data/dblp-latest.xml.gz
          key: dblp-dump-${{ github.run_id }}
          restore-keys: dblp-dump-

      - name: Cache OpenAlex author data
        uses: actions/cache@v4
        with:
          path: data/openalex_bu_authors_cache.json
          key: openalex-authors-${{ github.run_id }}
          restore-keys: openalex-authors-

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Run monthly update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          CI: "true"
        run: |
          mkdir -p logs output data
          if [ "${{ inputs.save_candidates }}" = "true" ]; then
            python update_monthly.py --ci --save-candidates=data/backlog_candidates.json 2>&1 | tee logs/monthly_ci.log
          else
            python update_monthly.py --ci 2>&1 | tee logs/monthly_ci.log
          fi

      - name: Upload candidates artifact
        if: ${{ inputs.save_candidates == true }}
        uses: actions/upload-artifact@v4
        with:
          name: backlog-candidates-${{ github.run_id }}
          path: data/backlog_candidates.json

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-update-logs-${{ github.run_id }}
          path: logs/

      - name: Create issue on pipeline failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "ALERT: Monthly update failed ($(date +%Y-%m-%d))" \
            --body "The automated monthly update pipeline failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." \
            --label "alert"
