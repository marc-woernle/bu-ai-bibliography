name: Weekly Bibliography Update

on:
  schedule:
    - cron: '0 7 * * 0'  # Sunday 7am UTC = 3am ET
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests rich aiohttp httpx

      - name: Run weekly update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        run: |
          mkdir -p logs
          python update_weekly.py 2>&1 | tee logs/weekly_ci.log

      - name: Commit and push
        run: |
          git config user.name "Marc Woernle"
          git config user.email "marcwho13@gmail.com"
          git add data/sonnet_classification_bu_verified.json \
                  data/update_state.json data/update_log.csv \
                  output/bibliography_app/data.js docs/data.js
          git diff --staged --quiet || git commit -m "weekly update (automated)"
          git push

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Weekly update failed ($(date +%Y-%m-%d))" \
            --body "The automated weekly update failed. Check the [workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) for details." \
            --label "alert"
